spring.application.name=authsystem

spring.jpa.hibernate.ddl-auto=none

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# URL de conexão: altera "seu_banco" pelo nome do banco que está no DBeaver
spring.datasource.url=jdbc:postgresql://localhost:5432/app_db

# Usuário do banco (geralmente é postgres)
spring.datasource.username=app_user

# Senha que você definiu no Docker e usou no DBeaver
spring.datasource.password=app_password

# Driver do PostgreSQL
spring.datasource.driver-class-name=org.postgresql.Driver