\asww# Docker-specific configuration
# Database: uses container hostname 'postgres' instead of localhost
spring.datasource.url=jdbc:postgresql://postgres:5432/app_db
spring.datasource.username=app_user
spring.datasource.password=app_password
spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway Configuration
spring.jpa.hibernate.ddl-auto=none
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
# Log Flyway migrations executed
logging.level.org.flywaydb=DEBUG

# Redis Configuration
spring.redis.host=redis
spring.redis.port=6379

# JWT Configuration - read from environment or use default
jwt.secret=${JWT_SECRET:some-32-char-minimum-secret-value-CHANGE_ME}

